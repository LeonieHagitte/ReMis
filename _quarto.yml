project:
  type: manuscript
  output-dir: .

manuscript:
  article: remis.qmd

bibliography: references.bib

format:
  html:
    toc: true
    number-sections: true
  pdf:
    documentclass: apa7
    classoption: [man]
    papersize: letter
    fontsize: 12pt
    linestretch: 2
    include-in-header:
      text: |
        \usepackage{csquotes}
