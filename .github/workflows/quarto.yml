name: Render manuscript

on:
  push:
    paths:
      - "remis.qmd"
      - "_quarto.yml"
      - "references.bib"
  workflow_dispatch:

jobs:
  render:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Quarto
        uses: quarto-dev/quarto-actions/setup@v2

      - name: Setup TinyTeX
        uses: r-lib/actions/setup-tinytex@v2

      - name: Install LaTeX packages
        run: tlmgr install apa7 csquotes

      - name: Render manuscript
        run: quarto render remis.qmd

      - name: List rendered files
        run: ls -lah

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: rendered-manuscript
          path: |
            remis.html
            remis.pdf
